name: CI

env:
  DEBUG: napi:*
  APP_NAME: hyperdb-api-node
  MACOSX_DEPLOYMENT_TARGET: '10.13'

permissions:
  contents: write
  id-token: write

on:
  push:
    branches: [main, hyperapi-node-dev]
    tags-ignore: ['**']
    paths: ['hyperdb-api-node/**', '.github/workflows/CI.yml']
  pull_request:
    paths: ['hyperdb-api-node/**']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
            build: cargo build -p hyperdb-api-node --release --target aarch64-apple-darwin

          - host: macos-13
            target: x86_64-apple-darwin
            build: cargo build -p hyperdb-api-node --release --target x86_64-apple-darwin

          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: cargo build -p hyperdb-api-node --release --target x86_64-unknown-linux-gnu

          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: >-
              apt-get update && apt-get install -y musl-tools &&
              cargo build -p hyperdb-api-node --release --target x86_64-unknown-linux-musl

          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: >-
              sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu &&
              cargo build -p hyperdb-api-node --release --target aarch64-unknown-linux-gnu
            env:
              CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: cargo build -p hyperdb-api-node --release --target x86_64-pc-windows-msvc

    name: Build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install npm dependencies
        working-directory: hyperdb-api-node
        run: npm install

      - name: Build native module
        working-directory: .
        run: ${{ matrix.settings.build }}
        env: ${{ matrix.settings.env || '{}' }}

      - name: Copy artifact to platform package
        shell: bash
        run: |
          node hyperdb-api-node/scripts/ci-copy-artifact.js ${{ matrix.settings.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: hyperdb-api-node/npm/*/hyperdb-api-node.*.node
          if-no-files-found: error

  test:
    name: Test - ${{ matrix.settings.host }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: hyperdb-api-node
        run: npm install

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: hyperdb-api-node

      - name: Move .node file to root
        shell: bash
        working-directory: hyperdb-api-node
        run: |
          find npm -name '*.node' -exec cp {} . \;
          ls -la *.node

      - name: Verify module loads
        working-directory: hyperdb-api-node
        run: node -e "const m = require('./index.js'); console.log('Exports:', Object.keys(m))"

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install npm dependencies
        working-directory: hyperdb-api-node
        run: npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: hyperdb-api-node/artifacts

      - name: Move artifacts to npm packages
        working-directory: hyperdb-api-node
        run: npx napi artifacts

      - name: List packages
        working-directory: hyperdb-api-node
        run: |
          ls -laR npm/
          echo "---"
          cat package.json

      - name: Publish platform packages
        working-directory: hyperdb-api-node
        run: |
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Publishing $dir..."
              cd "$dir"
              npm publish --access public || true
              cd -
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish root package
        working-directory: hyperdb-api-node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
