[alias]
# Shortcut: `cargo download-hyperd` bootstraps the hyperd executable into
# `.hyperd/current/` (auto-detected by Makefile/build.ps1). Pass flags
# after `--`, e.g. `cargo download-hyperd -- --latest --force`.
download-hyperd = "run --release --package hyperd-bootstrap --bin hyperd-bootstrap -- download"

# Use mold on Linux to avoid lld OOM-crashing on large debug link jobs
# (CI ubuntu-latest runners have ~7 GB RAM; linking the full workspace in
# debug mode with lld exhausts it and triggers a Bus error / signal 7).
# mold is pre-installed on ubuntu-latest since actions/runner-images 20240310.
# No effect on macOS or Windows (target cfg guards the override).
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
